name: Typewriter Row
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  Typewriter Row:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Typewriter Row
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.typewriterrow
        INFOPLIST_FILE: Typewriter Row/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        SUPPORTS_MACCATALYST: NO
    info:
      path: Typewriter Row/Info.plist
      properties:
        CFBundleDisplayName: Typewriter Row
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
  Typewriter RowTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Typewriter RowTests
    dependencies:
      - target: Typewriter Row
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.typewriterrow.tests
  Typewriter RowUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Typewriter RowUITests
    dependencies:
      - target: Typewriter Row
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.typewriterrow.uitests
schemes:
  Typewriter Row:
    build:
      targets:
        Typewriter Row: all
    test:
      targets:
        - Typewriter RowTests
        - Typewriter RowUITests
    run:
      config: Debug
    archive:
      config: Release
